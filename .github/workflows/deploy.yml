name: Deploy

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run database migrations after uploading artifacts
        required: true
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository code
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev rsync

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.20.0

      - name: Install shard dependencies
        run: shards install --production

      - name: Build Crystal binaries
        run: |
          if [ "${{ inputs.run_migrations }}" = "true" ]; then
            shards build --release web worker cli
          else
            shards build --release web worker
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Stage deploy files
        run: |
          mkdir -p deploy-package/bin
          cp bin/web bin/worker deploy-package/bin/
          if [ "${{ inputs.run_migrations }}" = "true" ]; then
            cp bin/cli deploy-package/bin/
          fi
          cp -R public deploy-package/

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload artifacts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$DEPLOY_PATH/bin' '$DEPLOY_PATH/public'"
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" \
            deploy-package/bin/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/bin/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" \
            deploy-package/public/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/public/"

      - name: Run migrations
        if: ${{ inputs.run_migrations }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && ./bin/cli migrate"

      - name: Restart services
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo systemctl restart shards.info_web.service shards.info_worker.service"
